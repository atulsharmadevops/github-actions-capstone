name: Main Branch Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.10"
      run_tests: true

  docker-build-push:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: atulsharmadochub/myapp
      tag: latest
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  docker-build-push-sha:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: atulsharmadochub/myapp
      tag: sha-${{ github.sha }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'atulsharmadochub/myapp:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build-push, docker-build-push-sha]
    environment: production
    steps:
      - name: Deploy to production
        run: 'echo "Deploying image: ${{ needs.docker-build-push.outputs.image_url }} to production"'
