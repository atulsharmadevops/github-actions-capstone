name: Main Branch Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.10"
      run_tests: true

  docker-build-push:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: atulsharmadochub/myapp
      tag: latest
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  docker-build-push-sha:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: atulsharmadochub/myapp
      tag: sha-${{ github.sha }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Scan and output SARIF
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1

   # pinned SHA
        with:
          image-ref: 'atulsharmadochub/myapp:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357   # pinned SHA
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build-push, docker-build-push-sha, trivy-scan]
    environment: production
    steps:
      - name: Deploy to production
        run: 'echo "Deploying image: ${{ needs.docker-build-push.outputs.image_url }} to production"'

